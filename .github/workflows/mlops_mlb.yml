name: MLB Quant MLOps

# ¿Cuándo se ejecutará este script?
on:
  schedule:
    # Se ejecuta todos los días a las 11:00 AM UTC (Aprox 6:00 AM / 7:00 AM en América)
    - cron: '0 11 * * *' 
  workflow_dispatch: # Esto te permite ejecutarlo manualmente desde la web de GitHub con un botón

jobs:
  actualizar_y_entrenar:
    runs-on: ubuntu-latest
    
    # Permiso vital: le damos poder al bot para modificar y guardar archivos en tu repositorio
    permissions:
      contents: write 

    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v4
      
    - name: 🐍 Configurar entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: 📦 Instalar librerías Quant
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: ⚙️ Ejecutar Auto-Ingesta y Reentrenamiento
      run: python updater_mlb.py
        
    - name: 💾 Guardar el nuevo conocimiento en la bóveda
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add mlb_historico.csv oraculo_mlb_xgboost.pkl
        # El [skip ci] evita que GitHub Actions entre en un bucle infinito
        git commit -m "🤖 MLOps: Auto-ingesta y reentrenamiento diario completado [skip ci]" || echo "Sin cambios nuevos para guardar hoy."
        git push