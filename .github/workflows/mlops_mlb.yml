name: Enjambre Quant MLB Diario

on:
  schedule:
    - cron: '0 13 * * *' # Corre todos los días a las 8:00 AM hora Colombia (13:00 UTC)
  workflow_dispatch: # Permite que lo actives tú manualmente desde la web

permissions:
  contents: write # FUNDAMENTAL: Da permiso para guardar el CSV

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas xgboost joblib scikit-learn MLB-StatsAPI

      - name: Ejecutar Auditoría y Bot
        run: |
          python updater_mlb.py || echo "No hubo partidos ayer"
          python bot_mlb.py

      - name: Guardar Progreso en la Nube
        run: |
          git config --global user.name "Enjambre-Bot"
          git config --global user.email "bot@enjambre.com"
          git add ledger_simulacion.csv cache_mlb.json
          git commit -m "Actualización diaria del Enjambre [skip ci]" || echo "Nada nuevo que guardar"
          git push